name: Publish SDK source prerelease

on:
  push:
    tags:
      - "v*.*.*-*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run release:check
      - name: Build exact release assets
        run: >-
          node scripts/build-sdk-release-assets.mjs
          --tag "$GITHUB_REF_NAME"
          --source "$GITHUB_SHA"
      - name: Package provider-free browser diagnostics
        run: >-
          tar -czf .artifacts/github-release/browser-host-page-diagnostics.tgz
          playwright-report test-results
      - name: Package validated release assets
        run: tar -czf "$RUNNER_TEMP/sdk-source-release.tgz" -C .artifacts/github-release .
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sdk-source-release-${{ github.ref_name }}
          path: ${{ runner.temp }}/sdk-source-release.tgz
          if-no-files-found: error
          retention-days: 30

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sdk-source-release-${{ github.ref_name }}
          path: ${{ runner.temp }}
      - name: Validate transferred release assets
        run: |
          archive="$RUNNER_TEMP/sdk-source-release.tgz"
          staging="$RUNNER_TEMP/sdk-source-release"
          mkdir -p "$staging"
          if tar -tzf "$archive" | grep -Eq '(^/|(^|/)\.\.(/|$))'; then
            echo 'Release artifact contains an unsafe path.' >&2
            exit 1
          fi
          tar --extract --gzip --file "$archive" --directory "$staging" --no-same-owner --no-same-permissions
          if find "$staging" -type l -print -quit | grep -q .; then
            echo 'Release artifact must not contain symlinks.' >&2
            exit 1
          fi
          if find "$staging" -mindepth 2 -type f -print -quit | grep -q .; then
            echo 'Release artifact files must remain at the archive root.' >&2
            exit 1
          fi
          expected='browser-host-page-diagnostics.tgz
          compatibility.json
          haya-inc-clawsembly-0.1.0-alpha.6.tgz
          haya-inc-clawsembly-0.1.0-alpha.6.tgz.sha256
          promotion-policy.json
          release-history.json
          release-notes.md
          sdk-release.json
          source-release.json
          source-release.schema.json'
          actual="$(find "$staging" -type f -exec basename {} \; | LC_ALL=C sort)"
          if [ "$actual" != "$expected" ]; then
            echo 'Release artifact file set is not exact.' >&2
            exit 1
          fi
          (cd "$staging" && sha256sum --check haya-inc-clawsembly-0.1.0-alpha.6.tgz.sha256)
      - name: Publish fail-closed source prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          staging="$RUNNER_TEMP/sdk-source-release"
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --prerelease \
            --title "Clawsembly SDK $GITHUB_REF_NAME" \
            --notes-file "$staging/release-notes.md" \
            "$staging/browser-host-page-diagnostics.tgz" \
            "$staging/compatibility.json" \
            "$staging/haya-inc-clawsembly-0.1.0-alpha.6.tgz" \
            "$staging/haya-inc-clawsembly-0.1.0-alpha.6.tgz.sha256" \
            "$staging/promotion-policy.json" \
            "$staging/release-history.json" \
            "$staging/sdk-release.json" \
            "$staging/source-release.json" \
            "$staging/source-release.schema.json"
      - name: Dispatch provenance-backed npm publication
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh workflow run npm-publish.yml
          --repo "$GITHUB_REPOSITORY"
          --ref main
          -f tag="$GITHUB_REF_NAME"
