name: Browser host, page, and evidence

on:
  workflow_dispatch:
    inputs:
      capture_browserpod:
        description: Run one owner-authorized, metered BrowserPod evidence capture.
        required: true
        type: boolean
        default: false
      capture_native:
        description: >-
          Capture one native-Gateway record (separate native-gateway evidence
          class; plain Node, no BrowserPod key, no metered spend).
        required: false
        type: boolean
        default: false
      evidence_report:
        description: >-
          Repo-relative pinned report the capture targets (must live under
          apps/web/public/data). Defaults to the current stable report.
        required: false
        type: string
        default: apps/web/public/data/compatibility.json
  schedule:
    - cron: "17 3 * * 6"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  browser-host-page:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser
      - name: Upload browser evidence and diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: browser-host-page-diagnostics
          path: |
            playwright-report
            test-results
          if-no-files-found: error
          retention-days: 30

  native-gateway-evidence:
    name: native-gateway-evidence
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.capture_native == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Capture one exact-artifact native Gateway record
        env:
          CLAWSEMBLY_EVIDENCE_REPORT: ${{ inputs.evidence_report }}
        run: npm run native:capture
      - name: Upload native evidence and payload-free status
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: native-gateway-evidence-${{ github.run_id }}
          path: test-results/native-gateway-evidence
          if-no-files-found: error
          retention-days: 30

  browserpod-evidence:
    name: owner-authorized-browserpod-evidence
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.capture_browserpod == true }}
    environment: browserpod-evidence
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install the exact BrowserPod evidence-host dependency
        run: npm ci --prefix examples/browserpod-evidence-host --ignore-scripts --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - name: Capture one exact-artifact BrowserPod record
        env:
          BROWSERPOD_API_KEY: ${{ secrets.BROWSERPOD_API_KEY }}
          CLAWSEMBLY_EVIDENCE_REPORT: ${{ inputs.evidence_report }}
        run: node examples/browserpod-evidence-host/capture.mjs
      - name: Upload redacted evidence and payload-free status
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: browserpod-evidence-${{ github.run_id }}
          path: test-results/browserpod-evidence
          if-no-files-found: error
          retention-days: 30
