name: Compatibility probe

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

jobs:
  static-inspection:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Track stable, previous, and preview
        run: >-
          npm run compat:track --
          --host-evidence apps/web/public/data/evidence/webcontainer-host.json
          --gateway-evidence apps/web/public/data/evidence/openclaw-2026.6.11-gateway.json
          --skip-unchanged
      - run: npm run compat:validate
      - name: Write summary
        run: |
          echo '## OpenClaw release-channel inspection' >> "$GITHUB_STEP_SUMMARY"
          node -e 'const h=require("./apps/web/public/data/release-history.json"); for (const r of h.releases) console.log(`- ${r.channel}: ${r.version} · ${r.status} · ${r.runtimeEvidence ? "runtime evidenced" : "static only"}`)' >> "$GITHUB_STEP_SUMMARY"
      - name: Package validated reports
        run: >-
          tar -czf "$RUNNER_TEMP/compatibility-reports.tgz"
          apps/web/public/data/compatibility.json
          apps/web/public/data/compatibility-badge.svg
          apps/web/public/data/release-history.json
          apps/web/public/data/releases/*.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compatibility-reports
          path: ${{ runner.temp }}/compatibility-reports.tgz

  publish-report-pr:
    needs: static-inspection
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: compatibility-reports
          path: ${{ runner.temp }}
      - name: Install validated reports
        run: |
          staging="$RUNNER_TEMP/compatibility-reports"
          mkdir -p "$staging"
          tar -xzf "$RUNNER_TEMP/compatibility-reports.tgz" -C "$staging"
          if find "$staging" -type l -print -quit | grep -q .; then
            echo 'Report artifact must not contain symlinks.' >&2
            exit 1
          fi
          cp "$staging/apps/web/public/data/compatibility.json" apps/web/public/data/compatibility.json
          cp "$staging/apps/web/public/data/compatibility-badge.svg" apps/web/public/data/compatibility-badge.svg
          cp "$staging/apps/web/public/data/release-history.json" apps/web/public/data/release-history.json
          cp "$staging"/apps/web/public/data/releases/*.json apps/web/public/data/releases/
      - name: Commit changed channel reports
        id: changes
        run: |
          if git diff --quiet -- apps/web/public/data/compatibility.json apps/web/public/data/compatibility-badge.svg apps/web/public/data/release-history.json apps/web/public/data/releases; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          branch='codex/openclaw-release-tracking'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git switch -c "$branch"
          git add apps/web/public/data/compatibility.json apps/web/public/data/compatibility-badge.svg apps/web/public/data/release-history.json apps/web/public/data/releases
          git commit -m 'chore: update OpenClaw release reports'
          remote_sha="$(git ls-remote --heads origin "refs/heads/$branch" | cut -f1)"
          if [ -n "$remote_sha" ]; then
            git push --force-with-lease="refs/heads/$branch:$remote_sha" origin "HEAD:refs/heads/$branch"
          else
            git push origin "HEAD:refs/heads/$branch"
          fi
          echo 'changed=true' >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
      - name: Open or update tracking pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.changes.outputs.branch }}
        run: |
          existing="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -z "$existing" ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title 'chore: update OpenClaw release reports' \
              --body "Automated stable / previous / preview compatibility inspection. Runtime evidence is attached only when its exact OpenClaw version matches. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          fi
