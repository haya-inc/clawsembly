name: Compatibility probe

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

# A manual dispatch racing the six-hour cron would contend for the same
# tracking branch; queue instead of overlapping.
concurrency:
  group: compatibility-tracking
  cancel-in-progress: false

jobs:
  static-inspection:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      protocol-outcome: ${{ steps.protocol-verify.outcome }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Track stable, previous, and preview
        run: >-
          npm run compat:track -- --skip-unchanged
      - run: npm run report-pin:generate
      - run: npm run report-pin:check
      - run: npm run compat:validate
      - name: Verify the generated Gateway contract against the exact npm artifact
        id: protocol-verify
        # An upstream stable that breaks contract regeneration must not
        # silence the tracker: publishing the report pull request is how that
        # break becomes visible. The recorded outcome travels to the summary
        # and the pull-request body, and the protocol gate in the check chain
        # keeps a report/contract mismatch fail-closed on the pull request.
        continue-on-error: true
        run: npm run protocol:verify
      - name: Write summary
        env:
          PROTOCOL_OUTCOME: ${{ steps.protocol-verify.outcome }}
        run: |
          echo '## OpenClaw release-channel inspection' >> "$GITHUB_STEP_SUMMARY"
          node -e 'const h=require("./apps/web/public/data/release-history.json"); for (const r of h.releases) console.log(`- ${r.channel}: ${r.version} · ${r.status} · ${r.runtimeEvidence ? "runtime evidenced" : "static only"}`)' >> "$GITHUB_STEP_SUMMARY"
          echo "- Gateway-contract verification against the tracked stable: $PROTOCOL_OUTCOME" >> "$GITHUB_STEP_SUMMARY"
      - name: Package validated reports
        run: >-
          tar -czf "$RUNNER_TEMP/compatibility-reports.tgz"
          apps/web/public/data/compatibility.json
          apps/web/public/data/compatibility-badge.svg
          apps/web/public/data/release-history.json
          apps/web/public/data/promotion-policy.json
          apps/web/public/data/releases/*.json
          examples/sdk-host/src/report-pin.ts
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: compatibility-reports
          path: ${{ runner.temp }}/compatibility-reports.tgz

  publish-report-pr:
    needs: static-inspection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: compatibility-reports
          path: ${{ runner.temp }}
      - name: Install validated reports
        run: |
          staging="$RUNNER_TEMP/compatibility-reports"
          mkdir -p "$staging"
          archive="$RUNNER_TEMP/compatibility-reports.tgz"
          if tar -tzf "$archive" | grep -Eq '(^/|(^|/)\.\.(/|$))'; then
            echo 'Report artifact contains an unsafe path.' >&2
            exit 1
          fi
          tar --extract --gzip --file "$archive" --directory "$staging" --no-same-owner --no-same-permissions
          if find "$staging" -type l -print -quit | grep -q .; then
            echo 'Report artifact must not contain symlinks.' >&2
            exit 1
          fi
          cp "$staging/apps/web/public/data/compatibility.json" apps/web/public/data/compatibility.json
          cp "$staging/apps/web/public/data/compatibility-badge.svg" apps/web/public/data/compatibility-badge.svg
          cp "$staging/apps/web/public/data/release-history.json" apps/web/public/data/release-history.json
          cp "$staging/apps/web/public/data/promotion-policy.json" apps/web/public/data/promotion-policy.json
          cp "$staging"/apps/web/public/data/releases/*.json apps/web/public/data/releases/
          cp "$staging/examples/sdk-host/src/report-pin.ts" examples/sdk-host/src/report-pin.ts
      - name: Commit changed channel reports
        id: changes
        run: |
          if git diff --quiet -- apps/web/public/data/compatibility.json apps/web/public/data/compatibility-badge.svg apps/web/public/data/release-history.json apps/web/public/data/promotion-policy.json apps/web/public/data/releases examples/sdk-host/src/report-pin.ts; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          branch='codex/openclaw-release-tracking'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git switch -c "$branch"
          git add apps/web/public/data/compatibility.json apps/web/public/data/compatibility-badge.svg apps/web/public/data/release-history.json apps/web/public/data/promotion-policy.json apps/web/public/data/releases examples/sdk-host/src/report-pin.ts
          git commit -m 'chore: update OpenClaw release reports'
          remote_sha="$(git ls-remote --heads origin "refs/heads/$branch" | cut -f1)"
          if [ -n "$remote_sha" ]; then
            git push --force-with-lease="refs/heads/$branch:$remote_sha" origin "HEAD:refs/heads/$branch"
          else
            git push origin "HEAD:refs/heads/$branch"
          fi
          echo 'changed=true' >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
      - name: Open or update tracking pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.changes.outputs.branch }}
          PROTOCOL_OUTCOME: ${{ needs.static-inspection.outputs.protocol-outcome }}
        run: |
          body="$(printf '%s\n\n%s\n\n%s' \
            'Automated stable / previous / preview compatibility inspection. Runtime evidence is attached only when its exact OpenClaw version matches.' \
            "Gateway-contract verification against the tracked stable: **${PROTOCOL_OUTCOME}**. A failure means the generated contract cannot be regenerated from the tracked stable artifact (an upstream declaration-layout or contract change); the reviewed contract stays on the previous stable, and the protocol gate in the check chain keeps this pull request fail-closed until a contract migration lands." \
            "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}")"
          existing="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [ -z "$existing" ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title 'chore: update OpenClaw release reports' \
              --body "$body"
          else
            gh pr edit "$existing" --body "$body"
          fi
