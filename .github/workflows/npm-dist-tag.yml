name: Point an npm dist-tag at a reviewed publication

on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Exact published version the dist-tag should point at. Must match
          the committed publication record.
        required: true
        type: string
      dist_tag:
        description: The npm dist-tag to move (for example, latest).
        required: true
        type: string
        default: latest

permissions:
  contents: read

concurrency:
  group: npm-dist-tag
  cancel-in-progress: false

jobs:
  retag:
    environment: npm-publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Bind the requested version to the committed publication record
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          REQUESTED_TAG: ${{ inputs.dist_tag }}
        run: |
          node --input-type=module -e '
            const { readFileSync } = await import("node:fs");
            const record = JSON.parse(readFileSync("packages/compatibility/npm-publication.json", "utf8"));
            const version = process.env.REQUESTED_VERSION;
            const tag = process.env.REQUESTED_TAG;
            if (!/^[a-z][a-z0-9-]{0,63}$/u.test(tag)) {
              throw new Error("dist-tag must be a bounded lowercase identifier");
            }
            if (record.status !== "published" || record.package?.version !== version) {
              throw new Error(`the committed publication record does not name ${version} as published`);
            }
            const response = await fetch(
              `https://registry.npmjs.org/${encodeURIComponent(record.package.name)}/${encodeURIComponent(version)}`,
              { headers: { Accept: "application/json", "Cache-Control": "no-cache" } }
            );
            if (!response.ok) throw new Error(`registry does not expose ${version}`);
            const manifest = await response.json();
            if (manifest.dist?.integrity !== record.integrity) {
              throw new Error("registry bytes do not match the reviewed publication record");
            }
            console.log(`verified ${record.package.name}@${version} against the committed record`);
          '
      - name: Move the dist-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          REQUESTED_VERSION: ${{ inputs.version }}
          REQUESTED_TAG: ${{ inputs.dist_tag }}
        run: |
          npm dist-tag add "@haya-inc/clawsembly@$REQUESTED_VERSION" "$REQUESTED_TAG"
          npm dist-tag ls "@haya-inc/clawsembly"
