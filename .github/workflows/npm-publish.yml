name: Publish SDK to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub prerelease tag to publish.
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    environment: npm-publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run release:check
      - name: Verify tag, provenance record, and GitHub Release bytes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(node -p "require('./packages/sdk-package/package.json').version")"
          expected_tag="v$version"
          if [ "$RELEASE_TAG" != "$expected_tag" ]; then
            echo "Release tag $RELEASE_TAG does not match SDK $version." >&2
            exit 1
          fi
          release_dir="$RUNNER_TEMP/github-release"
          mkdir -p "$release_dir"
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'haya-inc-clawsembly-*.tgz' \
            --pattern 'source-release.json' \
            --dir "$release_dir"
          tarball=".artifacts/sdk/haya-inc-clawsembly-$version.tgz"
          cmp "$tarball" "$release_dir/haya-inc-clawsembly-$version.tgz"
          node -e '
            const fs = require("node:fs");
            const provenance = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            if (provenance.tag !== process.env.RELEASE_TAG
              || provenance.sourceCommit !== require("node:child_process").execFileSync("git", ["rev-parse", "HEAD"], { encoding: "utf8" }).trim()
              || provenance.artifact.file !== `haya-inc-clawsembly-${provenance.package.version}.tgz`) {
              throw new Error("GitHub Release provenance does not match the checked-out tag");
            }
          ' "$release_dir/source-release.json"
      - name: Pin a trusted-publishing-capable npm CLI
        run: npm install --global npm@12.0.1 --ignore-scripts
      - name: Publish exact SDK tarball with provenance
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          version="$(node -p "require('./packages/sdk-package/package.json').version")"
          package='@haya-inc/clawsembly'
          tarball=".artifacts/sdk/haya-inc-clawsembly-$version.tgz"
          local_integrity="$(node -e 'const fs=require("node:fs"),c=require("node:crypto"); process.stdout.write(`sha512-${c.createHash("sha512").update(fs.readFileSync(process.argv[1])).digest("base64")}`)' "$tarball")"
          registry_integrity() {
            node --input-type=module -e '
              const [pkg, version] = process.argv.slice(1);
              const response = await fetch(
                `https://registry.npmjs.org/${encodeURIComponent(pkg)}/${encodeURIComponent(version)}`,
                { headers: { Accept: "application/json", "Cache-Control": "no-cache" } }
              );
              if (!response.ok) process.exit(1);
              const manifest = await response.json();
              if (manifest.name !== pkg || manifest.version !== version
                || typeof manifest.dist?.integrity !== "string") process.exit(1);
              process.stdout.write(manifest.dist.integrity);
            ' "$package" "$version"
          }
          if remote_integrity="$(registry_integrity)"; then
            if [ "$remote_integrity" != "$local_integrity" ]; then
              echo "Published npm bytes differ from the verified release." >&2
              exit 1
            fi
            echo "$package@$version already matches the verified release." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ -n "$NPM_TOKEN" ]; then
            export NODE_AUTH_TOKEN="$NPM_TOKEN"
          fi
          npm publish "$tarball" --access public --tag alpha --provenance --ignore-scripts
          remote_integrity=""
          for attempt in $(seq 1 12); do
            if remote_integrity="$(registry_integrity)"; then break; fi
            sleep 5
          done
          if [ -z "$remote_integrity" ]; then
            echo "npm registry did not expose the exact version after publishing." >&2
            exit 1
          fi
          if [ "$remote_integrity" != "$local_integrity" ]; then
            echo "npm registry integrity does not match the verified release." >&2
            exit 1
          fi
          echo "Published $package@$version with matching provenance-bound bytes." >> "$GITHUB_STEP_SUMMARY"
