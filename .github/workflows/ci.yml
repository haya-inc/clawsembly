name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  node_check:
    name: node-${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.19.0", "24"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Verify release readiness against the Pages build
        if: matrix.node-version == '24'
        run: |
          npm run build:pages
          node packages/compatibility/src/release-readiness.mjs
      - name: Run browser security probes
        if: matrix.node-version == '24'
        run: |
          npx playwright install --with-deps chromium
          npm run test:security
          npm run test:page

  check:
    name: check
    if: ${{ always() }}
    needs: node_check
    runs-on: ubuntu-latest
    steps:
      - name: Require every Node lane
        env:
          NODE_CHECK_RESULT: ${{ needs.node_check.result }}
        run: test "$NODE_CHECK_RESULT" = success
