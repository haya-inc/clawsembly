# examples/sdk-host and examples/browserpod-evidence-host are intentionally
# not tracked here: their locks pin the reviewed SDK tarball and the exact
# metered provider (browserpod@2.12.1), and only move with reviewed releases.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    groups:
      development-tooling:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
