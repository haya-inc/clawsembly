name: Compatibility finding
description: Report a reproducible OpenClaw or browser-runtime compatibility result.
title: "compat: "
labels: ["compatibility", "needs-triage"]
body:
  - type: input
    id: openclaw-version
    attributes:
      label: OpenClaw version
      placeholder: 2026.6.11
    validations:
      required: true
  - type: input
    id: browserpod-version
    attributes:
      label: BrowserPod version
      description: Use the exact adopted runtime version, or write "not booted" for static/provider-free findings.
      placeholder: 2.12.1
    validations:
      required: true
  - type: dropdown
    id: evidence-source
    attributes:
      label: Evidence source
      options:
        - Static artifact inspection
        - Provider-free contract test
        - Owner-authorized BrowserPod run
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and operating system
      placeholder: Chrome 140 / macOS 16
    validations:
      required: true
  - type: dropdown
    id: stage
    attributes:
      label: Probe stage
      options:
        - Artifact inspection
        - BrowserPod preflight
        - Installation
        - Gateway boot
        - Gateway handshake
        - Device pairing
        - Device-token reconnect
        - Mocked chat
        - Capability broker
        - Persistence
        - Performance
        - Disabled capability
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include exact commands, configuration with secrets removed, and the smallest relevant log.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected classification
      description: Explain whether this should pass, warn, fail, or remain unsupported.
    validations:
      required: true
  - type: checkboxes
    id: secret-handling
    attributes:
      label: Secret handling
      options:
        - label: I removed BrowserPod keys, Gateway tokens, device tokens, provider credentials, private keys, and user payloads from this report.
          required: true
